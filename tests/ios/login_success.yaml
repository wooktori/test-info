appId: com.day2life.JuneFree
---
- launchApp:
    clearState: true

# 앱 실행 후 초기 화면 확인
- tapOn: "사용법 확인하기"
- tapOn: "허용 안 함"
- tapOn: "IntroRight"

- tapOn:
    point: 59%,26%
- tapOn: "나가기"
- tapOn: "로그인"

# 로그인
- tapOn: "이메일"
- inputText: ${TIMEBLOCKS_EMAIL}
- tapOn: "비밀번호"
- inputText: ${TIMEBLOCKS_PASSWORD}
- tapOn: "로그인"

# 로그인 성공 후 메인 화면 확인
- assertVisible: "캘린더"
