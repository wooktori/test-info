appId: com.hellowo.day2life
---
- launchApp:
    clearState: false

# 좌측 상단 프로필 버튼 -> 사이드 메뉴
- tapOn:
    id: "menuBtn"
- tapOn:
    id: "menuSettingsBtn"

# 설정 - 주말 및 휴일 날짜 강조
- tapOn:
    id: "weekendLayout"
- assertVisible: "주말 및 휴일 날짜 강조"

# 토요일 강조 토글 ON (weekend_highlight_setting.json 기준, 별도 resourceId 없어 좌표 사용)
- tapOn:
    point: 84%,14%

- tapOn:
    point:3%,6%
- tapOn:
    id: "backBtn"

# 캘린더로 복귀 확인 (색상 변경 여부는 Maestro로 assert 불가 -> 스크린샷으로 육안 확인)
- assertVisible: "캘린더"
- takeScreenshot: settings_weekend_highlight_on
