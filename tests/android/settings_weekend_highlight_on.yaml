appId: com.hellowo.day2life
---
- launchApp:
    clearState: true
- tapOn:
    id: "howEasyBtn"
- tapOn:
    id: "laterBtn"
- tapOn:
    id: "nextBtn"
- tapOn:
    point: 59%,26%
- tapOn: "Leave"
- tapOn: "Sign in"

- tapOn: "이메일을 입력해 주세요."
- inputText: ${TIMEBLOCKS_EMAIL}
- tapOn: "6~20자리의 숫자 또는 문자를 입력해 주세요."
- inputText: ${TIMEBLOCKS_PASSWORD}
- tapOn: "Sign in"

#팝업(로그인 저장, 프로모션...)에서 flaky
- tapOn: "Never"
- tapOn:
    point: 85%,26%
- tapOn:
    point: 85%,26%

- assertVisible: "캘린더"

# 좌측 상단 프로필 버튼 -> 사이드 메뉴
- tapOn:
    id: "menuBtn"
- tapOn:
    id: "menuSettingsBtn"

# 설정 - 주말 및 휴일 날짜 강조
- tapOn:
    id: "weekendLayout"
- assertVisible: "주말 및 휴일 날짜 강조"

# 토요일 강조 토글 ON (weekend_highlight_setting.json 기준, 별도 resourceId 없어 좌표 사용)
- tapOn:
    point: 89%,17%

- back
- back

# 캘린더로 복귀 확인 (색상 변경 여부는 Maestro로 assert 불가 -> 스크린샷으로 육안 확인)
- assertVisible: "캘린더"
- takeScreenshot: settings_weekend_highlight_on
