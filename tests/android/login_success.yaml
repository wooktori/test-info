appId: com.hellowo.day2life
---
# 온보딩 화면 통과
- launchApp:
    clearState: true
- tapOn:
    id: "howEasyBtn"
- tapOn:
    id: "laterBtn"
- tapOn:
    id: "nextBtn"
- tapOn:
    point: 59%,26%
- tapOn: "Leave"
- tapOn: "Sign in"

# 로그인
- tapOn: "이메일을 입력해 주세요."
- inputText: ${TIMEBLOCKS_EMAIL}
- tapOn: "6~20자리의 숫자 또는 문자를 입력해 주세요."
- inputText: ${TIMEBLOCKS_PASSWORD}
- tapOn: "Sign in"

# 로그인 성공 검증
- extendedWaitUntil:
    visible: "캘린더"
    timeout: 45000
