appId: com.hellowo.day2life
---
- launchApp:
    clearState: true
- tapOn:
    id: "howEasyBtn"
- tapOn:
    id: "laterBtn"
- tapOn:
    id: "nextBtn"
- tapOn:
    point: 59%,26%
- tapOn: "Leave"
- tapOn: "Sign in"

- tapOn: "이메일을 입력해 주세요."
- inputText: ${TIMEBLOCKS_EMAIL}
- tapOn: "6~20자리의 숫자 또는 문자를 입력해 주세요."
- inputText: ${TIMEBLOCKS_PASSWORD}
- tapOn: "Sign in"

#팝업(로그인 저장, 프로모션...)에서 flaky
- tapOn: "Never"
- tapOn:
    point: 85%,26%
- tapOn:
    point: 85%,26%

- assertVisible: "캘린더"